<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AylizDev | Links</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899, #d73939, #38c8f4);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        #splash.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .splash-text {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 5px;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseFade 2.5s ease-in-out forwards;
            text-align: center;
        }

        @keyframes pulseFade {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 0; filter: blur(10px); }
        }

        #main-content {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease-out, transform 1s ease-out;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            display: none; 
            margin: auto;
        }

        .profile-section {
            margin-bottom: 30px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--glass-border);
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            object-fit: cover;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .link-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }

        .link-card:active {
            transform: scale(0.96);
        }

        .link-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .link-card i {
            width: 24px;
            height: 24px;
        }

        footer {
            margin-top: 50px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .splash-text { font-size: 2.2rem; }
            #main-content { 
                width: 92%; 
                padding: 10px;
            }
            .link-card {
                padding: 15px 20px;
            }
            h1 { font-size: 1.3rem; }
            p { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    
    <div id="splash">
        <div class="splash-text">AylizDev</div>
    </div>

    <div id="main-content">
        <div class="profile-section">
            <img src="https://github.com/merveayliz.png" alt="AylizDev" class="profile-img">
            <h1>Ayliz Azaklı</h1>
            <p>Web Design & Coding Student<br>AI Enthusiast</p>
        </div>

        <div class="links-container">
           
            <a href="https://www.linkedin.com/in/ayliz-azaklı-74579b318/" target="_blank" class="link-card">
                <div class="link-info">
                    <i data-lucide="linkedin"></i>
                    <span>LinkedIn</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </a>

            <a href="https://github.com/merveayliz" target="_blank" class="link-card">
                <div class="link-info">
                    <i data-lucide="github"></i>
                    <span>GitHub</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </a>

            <a href="https://youtube.com/@aylizdev" target="_blank" class="link-card">
                <div class="link-info">
                    <i data-lucide="youtube"></i>
                    <span>YouTube</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </a>
            
            <a href="https://merveayliz.github.io/ayliz-dev-/" target="_blank" class="link-card">
                <div class="link-info">
                    <i data-lucide="globe"></i>
                    <span>Portfolio</span>
                </div>
                <i data-lucide="chevron-right"></i>
            </a>
        </div>

        <footer>
            © 2026 AylizDev - Tasarım ve Kodlama
        </footer>
        
    </div>

    <script>
        lucide.createIcons();
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash');
            const mainContent = document.getElementById('main-content');

            setTimeout(() => {
                splash.classList.add('fade-out');
                
                mainContent.style.display = 'block';
                
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                    mainContent.style.transform = 'translateY(0)';
                }, 100);

            }, 2500);
        });
    </script>
  </body>
</html>
